name: Quote of Day

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: quote-of-day
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests loguru python-dotenv

      - name: Run bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}


          QUOTE_SOURCE_CHANNELS: "1323051039192252506, 1471516611302395995, 1464977218521403477, 1464976455653134628, 1469716246407811133, 1465367210196205578"


          QUOTE_POST_CHANNEL_ID: "1471673873362718841"
          GUILD_ID: "1460130124598087712"

          # настройки
          QUOTE_LOOKBACK_HOURS: "24"
          QUOTE_LANG: "any"


          QUOTE_DRY_RUN: "1"

          # output files
          QUOTE_SELECTED_ONLY_ARCHIVE_PATH: "quotes_selected_only.json"
          QUOTE_RUN_OUT_JSON_PATH: "quote_run.json"


          QUOTE_HARD_MAX_MESSAGES_PER_CHANNEL: "40000"
          QUOTE_DISCORD_MAX_MESSAGE_LEN: "1900"
          QUOTE_MAX_TEXT_LEN: "300"

        run: |
          python quote_of_day.py

      - name: Commit and push archive
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add quotes_selected_only.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update quotes archive"
          git push
